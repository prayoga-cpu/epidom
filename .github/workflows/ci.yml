name: CI

# Minimal, necessary gate: lint + type-check. These mirror the local
# `pnpm type-check && pnpm lint` checks the project requires before commit.
# (The old "Security Audit" workflow was removed — its blocking `pnpm audit
# --audit-level=critical` and the test job were noisy/red and not gating.)

on:
  push:
    branches: [main, dev]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        # Must match the project's pnpm major (10). pnpm 9 rejects the
        # config-only pnpm-workspace.yaml (no `packages:` field) with
        # "packages field missing or empty" when setup-node runs `pnpm store path`.
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma generate

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check
